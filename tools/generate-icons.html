<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор иконок ОТКЛИК24</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0B0F1A;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: #161B22;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 2rem; color: #00F5A0; }
        .preview {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            align-items: flex-end;
        }
        .icon-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .icon-box span {
            font-size: 12px;
            color: #8b949e;
        }
        button {
            background: #00F5A0;
            color: #0B0F1A;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            margin: 0.5rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 245, 160, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Генератор иконок</h1>
        <p>Нажмите кнопки ниже, чтобы скачать PNG версии иконок для публикации.</p>
        <p style="color: #8b949e; margin-bottom: 2rem;">Сохраните их в папку <code>icons/</code> в вашем проекте.</p>
        
        <div class="preview">
            <div class="icon-box">
                <canvas id="c128" width="128" height="128"></canvas>
                <span>128x128</span>
            </div>
            <div class="icon-box">
                <canvas id="c64" width="64" height="64"></canvas>
                <span>64x64</span>
            </div>
            <div class="icon-box">
                <canvas id="c48" width="48" height="48"></canvas>
                <span>48x48</span>
            </div>
            <div class="icon-box">
                <canvas id="c32" width="32" height="32"></canvas>
                <span>32x32</span>
            </div>
            <div class="icon-box">
                <canvas id="c16" width="16" height="16"></canvas>
                <span>16x16</span>
            </div>
        </div>

        <div id="actions">
            <button onclick="downloadAll()">Скачать все (по одной)</button>
        </div>
        <div style="margin-top: 1rem; display: flex; flex-wrap: wrap; justify-content: center;">
            <button onclick="downloadIcon(128)">Скачать 128x128</button>
            <button onclick="downloadIcon(64)">Скачать 64x64</button>
            <button onclick="downloadIcon(48)">Скачать 48x48</button>
            <button onclick="downloadIcon(32)">Скачать 32x32</button>
            <button onclick="downloadIcon(16)">Скачать 16x16</button>
        </div>
    </div>

    <script>
        // Embed SVG directly to avoid CORS and loading issues
        const svgData = `<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="24" fill="#0B0F1A"/>
  <path d="M30 64L54 88L98 44" stroke="#00F5A0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="98" cy="30" r="10" fill="#00F5A0">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>`;

        function initGenerator() {
            const img = new Image();
            const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                const sizes = [128, 64, 48, 32, 16];
                sizes.forEach(size => {
                    const canvas = document.getElementById('c' + size);
                    const ctx = canvas.getContext('2d');
                    // Draw rounded rect background manually if needed or rely on SVG
                    ctx.drawImage(img, 0, 0, size, size);
                });
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        function downloadIcon(size) {
            const canvas = document.getElementById('c' + size);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadAll() {
            [128, 64, 48, 32, 16].forEach(size => {
                setTimeout(() => downloadIcon(size), size * 200);
            });
        }
        
        window.onload = initGenerator;
    </script>
</body>
</html>
