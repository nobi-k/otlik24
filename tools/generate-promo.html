<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Promo Image</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        canvas {
            border: 1px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #00F5A0;
            border: none;
            border-radius: 5px;
            color: #0B0F1A;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Promo Image (300x188)</h2>
    <canvas id="canvas" width="300" height="188"></canvas>
    <button onclick="downloadImage()">Download Promo Image</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Colors
        const bg = '#0B0F1A';
        const accent = '#00F5A0';
        const textWhite = '#FFFFFF';

        // Draw Background
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, 300, 188);

        // Draw Icon (Simplified SVG content)
        // Scale: 0.8
        // Original SVG ViewBox 128x128. Let's position it on the left.
        
        ctx.save();
        ctx.translate(20, 44); // Position icon
        ctx.scale(0.8, 0.8);   // Scale down a bit from 128 to ~100
        
        // Icon Background (Rect) - optional, maybe just the checkmark?
        // Let's keep the rounded rect to match the icon look
        ctx.fillStyle = '#1A233A'; // Slightly lighter than bg for the icon box
        // ctx.fillStyle = bg; // Or transparent
        // Since the main BG is the same color, let's just draw the content
        
        // Draw Checkmark
        ctx.strokeStyle = accent;
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(30, 64);
        ctx.lineTo(54, 88);
        ctx.lineTo(98, 44);
        ctx.stroke();

        // Draw Circle Dot
        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.arc(98, 30, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // Draw Text
        ctx.font = 'bold 32px sans-serif';
        ctx.fillStyle = textWhite;
        ctx.textAlign = 'left';
        ctx.fillText('ОТКЛИК24', 130, 85);

        ctx.font = '16px sans-serif';
        ctx.fillStyle = accent;
        ctx.fillText('Автоотклик', 130, 115);
        ctx.fillText('на HH.ru', 130, 135);

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'promo-300x188.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
