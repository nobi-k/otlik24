<!DOCTYPE html>
<html style="background-color: #0b0f1a;">
<head>
  <meta charset="UTF-8">
  <title>ОТКЛИК24</title>
  <style>
    :root {
      --bg-color: #0b0f1a;
      --card-bg: #161b2a;
      --accent-color: #00f5a0;
      --accent-hover: #00d98b;
      --text-main: #ffffff;
      --text-muted: #8b949e;
      --border-color: #30363d;
    }
    
    * { box-sizing: border-box; }

    body { 
      width: 350px; 
      margin: 0;
      padding: 16px; 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    h2 { 
      font-size: 22px; 
      margin: 0; 
      font-weight: 800; 
      color: var(--accent-color);
      letter-spacing: -0.5px;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    .card {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      margin-bottom: 12px;
    }

    label { 
      display: block; 
      font-size: 10px; 
      font-weight: 700; 
      margin-bottom: 8px; 
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .template-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .template-btn {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
    }
    
    .template-btn.active {
      background: var(--accent-color);
      color: #000;
      border-color: var(--accent-color);
    }

    textarea { 
      width: 100%; 
      height: 90px; 
      background: rgba(0,0,0,0.2);
      border-radius: 8px; 
      border: 1px solid var(--border-color); 
      padding: 10px; 
      font-size: 13px;
      color: var(--text-main);
      resize: none;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--accent-color); }

    .limit-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] { flex: 1; accent-color: var(--accent-color); cursor: pointer; }
    .limit-value { font-weight: 800; color: var(--accent-color); font-size: 16px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      text-align: center;
    }
    .stat-value { font-size: 18px; font-weight: 800; }
    .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
    
    .btn { 
      background: var(--accent-color); 
      color: #000; 
      border: none; 
      padding: 14px; 
      width: 100%; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 800; 
      font-size: 14px;
      margin-bottom: 8px;
    }
    .btn:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      padding: 8px;
      font-size: 11px;
      margin-top: 5px;
    }

    .btn-telegram {
      background: #24A1DE;
      color: #fff;
      border: none;
      padding: 8px;
      font-size: 11px;
      margin-top: 5px;
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-telegram:hover { background: #1c88bd; }

    .footer {
      margin-top: 15px;
      font-size: 10px;
      text-align: center;
      color: var(--text-muted);
      opacity: 0.5;
    }
    
    .blacklist-area { height: 40px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <div id="headerTitleArea" style="display: flex; flex-direction: column; cursor: pointer;" title="Открыть канал создателя">
      <h2 style="cursor: pointer;">ОТКЛИК24</h2>
      <div style="font-size: 11px; color: #24A1DE; font-weight: 700; margin-top: -2px;">@kopirajchu</div>
    </div>
    <div id="statusBadge" class="status-badge">Готов</div>
  </div>

  <div class="card">
    <label>Шаблон письма</label>
    <div class="template-selector">
      <button class="template-btn active" data-id="0">№1</button>
      <button class="template-btn" data-id="1">№2</button>
      <button class="template-btn" data-id="2">№3</button>
    </div>
    <textarea id="letterText"></textarea>
  </div>

  <div class="card">
    <label>Лимит: <span id="limitDisplay" class="limit-value">50</span></label>
    <div class="limit-container">
      <input type="range" id="dailyLimit" min="1" max="200" value="50">
    </div>
    <label style="margin-top: 12px;">Черный список</label>
    <textarea id="blacklist" class="blacklist-area" placeholder="Компании через запятую..."></textarea>
  </div>

  <div class="stats card">
    <div class="stat-item">
      <div id="statApplied" class="stat-value">0</div>
      <div class="stat-label">Сегодня</div>
    </div>
    <div class="stat-item" style="border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color);">
      <div id="statSkipped" class="stat-value">0</div>
      <div class="stat-label">Пропуск</div>
    </div>
    <div class="stat-item">
      <div id="statHistory" class="stat-value">0</div>
      <div class="stat-label">Всего</div>
    </div>
  </div>

  <button id="startBtn" class="btn">Запустить автоотклик</button>
  <button id="exportBtn" class="btn btn-secondary">Экспорт истории (CSV)</button>

  <div class="footer">ОТКЛИК24 v1.1.1 | 2026</div>

  <script src="popup.js"></script>
</body>
</html>
